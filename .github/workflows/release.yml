name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.4.0)"
        required: true

jobs:
  # ── 1. tag ────────────────────────────────────────────────────────────────
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout sk
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Extract version
        id: version
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ── 2. build ──────────────────────────────────────────────────────────────
  build:
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout sk
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          go build -ldflags "-X main.version=v${VERSION}" \
            -o sk_${{ matrix.goos }}_${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sk_${{ matrix.goos }}_${{ matrix.goarch }}
          path: sk_${{ matrix.goos }}_${{ matrix.goarch }}

  # ── 3. GitHub release with prebuilt binaries ──────────────────────────────
  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package binaries
        run: |
          cp dist/sk_linux_amd64/sk_linux_amd64   dist/sk_linux_amd64/sk
          cp dist/sk_darwin_amd64/sk_darwin_amd64 dist/sk_darwin_amd64/sk
          cp dist/sk_darwin_arm64/sk_darwin_arm64 dist/sk_darwin_arm64/sk
          tar -czf dist/sk_linux_amd64/sk_linux_amd64.tar.gz  -C dist/sk_linux_amd64  sk
          tar -czf dist/sk_darwin_amd64/sk_darwin_amd64.tar.gz -C dist/sk_darwin_amd64 sk
          tar -czf dist/sk_darwin_arm64/sk_darwin_arm64.tar.gz -C dist/sk_darwin_arm64 sk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.tag.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v${VERSION}" \
            --generate-notes \
            dist/sk_linux_amd64/sk_linux_amd64.tar.gz \
            dist/sk_darwin_amd64/sk_darwin_amd64.tar.gz \
            dist/sk_darwin_arm64/sk_darwin_arm64.tar.gz

  # ── 4. post-release housekeeping ──────────────────────────────────────────
  post-release:
    needs: [tag, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout sk
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 of release binaries
        id: sha256
        env:
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          base="https://github.com/erikkinding/sk/releases/download/v${VERSION}"
          sha_linux_amd64=$(curl -sL "${base}/sk_linux_amd64.tar.gz"  | shasum -a 256 | awk '{print $1}')
          sha_amd64=$(curl -sL "${base}/sk_darwin_amd64.tar.gz" | shasum -a 256 | awk '{print $1}')
          sha_arm64=$(curl -sL "${base}/sk_darwin_arm64.tar.gz" | shasum -a 256 | awk '{print $1}')
          echo "sha256_linux_amd64=$sha_linux_amd64" >> "$GITHUB_OUTPUT"
          echo "sha256_amd64=$sha_amd64" >> "$GITHUB_OUTPUT"
          echo "sha256_arm64=$sha_arm64" >> "$GITHUB_OUTPUT"

      - name: Update README version
        env:
          VERSION: ${{ needs.tag.outputs.version }}
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          branch="release/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          sed -i "s|go install github.com/erikkinding/sk@v[^\"]*|go install github.com/erikkinding/sk@v${VERSION}|" README.md
          git add README.md
          git commit -m "Update README install version to v${VERSION}"
          git push origin "$branch"
          gh pr create \
            --title "Release v${VERSION}" \
            --body "Automated README update for v${VERSION}." \
            --base main \
            --head "$branch"
          gh pr merge --auto --squash

      - name: Update Homebrew formula
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.tag.outputs.version }}
          SHA256_LINUX_AMD64: ${{ steps.sha256.outputs.sha256_linux_amd64 }}
          SHA256_AMD64: ${{ steps.sha256.outputs.sha256_amd64 }}
          SHA256_ARM64: ${{ steps.sha256.outputs.sha256_arm64 }}
        run: |
          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/erikkinding/homebrew-tap.git
          cd homebrew-tap

          # Update version and download URLs
          sed -i "s|version \"[^\"]*\"|version \"${VERSION}\"|" Formula/sk.rb
          sed -i "s|/download/v[^/]*/|/download/v${VERSION}/|g" Formula/sk.rb

          # Update each sha256 by matching the binary name on the preceding url line
          perl -i -0pe "
            s|(sk_darwin_arm64\.tar\.gz\"\n\s+sha256 \")[^\"]+|\${1}${SHA256_ARM64}|;
            s|(sk_darwin_amd64\.tar\.gz\"\n\s+sha256 \")[^\"]+|\${1}${SHA256_AMD64}|;
            s|(sk_linux_amd64\.tar\.gz\"\n\s+sha256 \")[^\"]+|\${1}${SHA256_LINUX_AMD64}|;
          " Formula/sk.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sk.rb
          git commit -m "sk v${VERSION}"
          git push
